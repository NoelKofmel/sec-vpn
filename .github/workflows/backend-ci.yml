name: Backend CI

on:
  push:
    branches-ignore:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - run: ruff check .
        working-directory: backend
      - run: ruff format --check .
        working-directory: backend
      - run: mypy app
        working-directory: backend

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: secvpn
          POSTGRES_PASSWORD: secvpn_dev
          POSTGRES_DB: secvpn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - run: pytest --cov=app --cov-report=term-missing
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://secvpn:secvpn_dev@localhost:5432/secvpn_test

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "." pip-audit
        working-directory: backend
      - run: pip-audit
        working-directory: backend
